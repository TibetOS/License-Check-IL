<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="בדיקת פרטי רכב לפי מספר לוחית רישוי, ישירות ממאגר משרד התחבורה (data.gov.il)">
  <title>בדיקת רכב לפי מספר רישוי</title>
  <meta name="theme-color" content="#ffd320">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="בדיקת רכב">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <header class="header">
      <h1>🚗 בדיקת רכב</h1>
      <p class="subtitle">הזינו מספר לוחית רישוי וקבלו את פרטי הרכב ממאגר משרד התחבורה</p>
    </header>

    <form id="search-form" novalidate>
      <div class="plate-wrap">
        <input
          id="plate-input"
          type="text"
          inputmode="numeric"
          autocomplete="off"
          placeholder="12-345-67"
          aria-label="מספר לוחית רישוי"
          aria-describedby="input-hint"
        >
        <button type="button" id="clear-input" class="clear-input" aria-label="ניקוי המספר" tabindex="-1">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6L18 18M18 6L6 18"/></svg>
        </button>
      </div>
      <p id="input-hint" class="hint">7 או 8 ספרות, אפשר עם או בלי מקפים (לרכב ותיק גם מספר קצר יותר)</p>
      <button id="submit-btn" type="submit">בדיקה</button>
    </form>

    <div id="status" role="status" aria-live="polite"></div>

    <section id="result" class="card hidden" aria-label="פרטי הרכב">
      <div id="result-banner" class="banner hidden"></div>
      <div class="card-header">
        <span id="result-plate" class="plate-badge" dir="ltr"></span>
        <h2 id="result-title"></h2>
        <p id="result-subtitle" class="result-subtitle hidden"></p>
        <button type="button" id="share-btn" class="share-btn hidden">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="18" cy="5" r="2.5"/>
            <circle cx="6" cy="12" r="2.5"/>
            <circle cx="18" cy="19" r="2.5"/>
            <path d="M8.3 10.8l7.4-4.3M8.3 13.2l7.4 4.3"/>
          </svg>
          <span id="share-btn-label">שיתוף קישור</span>
        </button>
      </div>
      <div id="verdict-box" class="verdict hidden" aria-label="תמצית הבדיקה"></div>
      <dl id="result-details" class="details"></dl>
      <div id="history-box" class="history hidden" aria-label="היסטוריית הרכב"></div>
      <div id="indicator-box" class="indicators hidden" aria-label="חיווים נוספים"></div>
      <div id="safety-box" class="safety hidden"></div>
      <div id="permit-box" class="permit hidden"></div>
      <div id="recall-box" class="recall hidden" role="alert"></div>
    </section>

    <section id="recent" class="recent hidden" aria-label="חיפושים אחרונים">
      <div class="recent-head">
        <h3>חיפושים אחרונים</h3>
        <button id="clear-recent" type="button">ניקוי</button>
      </div>
      <ul id="recent-list"></ul>
    </section>

    <footer class="footer">
      <p>
        הנתונים מסופקים על ידי
        <a href="https://data.gov.il/dataset/private-and-commercial-vehicles" target="_blank" rel="noopener">מאגר המידע הממשלתי data.gov.il</a>
        ואינם כוללים פרטים אישיים.
      </p>
    </footer>
  </main>

  <script src="app.js"></script>
  <script src="scanner.js"></script>
</body>
</html>
